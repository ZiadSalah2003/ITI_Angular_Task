<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Student Details</h2>
            <a routerLink="/student" class="btn btn-outline-secondary">Back</a>
          </div>

          @if (errorMessage()) {
            <div class="alert alert-danger py-2 mb-0">{{ errorMessage() }}</div>
          }

          @if (student()) {
            <dl class="row mb-0">
              <dt class="col-sm-3">Id</dt>
              <dd class="col-sm-9">{{ student()!.id }}</dd>

              <dt class="col-sm-3">Name</dt>
              <dd class="col-sm-9">{{ student()!.name }}</dd>

              <dt class="col-sm-3">Age</dt>
              <dd class="col-sm-9">{{ student()!.age }}</dd>

              <dt class="col-sm-3">Department</dt>
              <dd class="col-sm-9">{{ student()!.departmentName }}</dd>
            </dl>
          }
        </div>
      </div>
    </div>
  </div>
</section>
