<section class="container-fluid py-4 px-4">
	<div class="row">
		<div class="col-12">
			<div class="card shadow-sm border-0 mb-3">
				<div class="card-body p-4">
					<div class="d-flex justify-content-between align-items-center mb-3">
						<h2 class="h4 mb-0">Students</h2>
						<a routerLink="/student/create" class="btn btn-primary">Create Student</a>
					</div>

					@if (errorMessage()) {
						<div class="alert alert-danger py-2 mb-3">{{ errorMessage() }}</div>
					}

					<div class="table-responsive">
						<table class="table table-striped align-middle mb-0">
							<thead>
								<tr>
									<th scope="col">Id</th>
									<th scope="col">Name</th>
									<th scope="col">Age</th>
									<th scope="col">Department</th>
									<th scope="col" class="text-end">Actions</th>
								</tr>
							</thead>
							<tbody>
								@for (student of students(); track student.id) {
									<tr>
										<td>{{ student.id }}</td>
										<td>{{ student.name }}</td>
										<td>{{ student.age }}</td>
										<td>{{ student.departmentName }}</td>
										<td class="text-end">
											<a [routerLink]="['/student', student.id, 'edit']" class="btn btn-sm btn-outline-primary me-2">Edit</a>
											<a [routerLink]="['/student', student.id, 'details']" class="btn btn-sm btn-outline-info me-2">Details</a>
											<a [routerLink]="['/student', student.id, 'delete']" class="btn btn-sm btn-outline-danger">Delete</a>
										</td>
									</tr>
								} @empty {
									<tr>
										<td colspan="5" class="text-center text-secondary">No students found.</td>
									</tr>
								}
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>
