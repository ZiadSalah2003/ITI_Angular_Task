<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-7">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Edit Student</h2>
            <a routerLink="/student" class="btn btn-outline-secondary">Back</a>
          </div>

          <form (ngSubmit)="submit()" class="d-grid gap-3">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label for="name" class="form-label">Name</label>
                <input
                  id="name"
                  name="name"
                  class="form-control"
                  type="text"
                  [ngModel]="request().name"
                  (ngModelChange)="request.set({ ...request(), name: $event })"
                />
              </div>

              <div class="col-12 col-md-3">
                <label for="age" class="form-label">Age</label>
                <input
                  id="age"
                  name="age"
                  class="form-control"
                  type="number"
                  min="1"
                  [ngModel]="request().age"
                  (ngModelChange)="request.set({ ...request(), age: +$event })"
                />
              </div>

              <div class="col-12 col-md-3">
                <label for="departmentId" class="form-label">Department</label>
                <select
                  id="departmentId"
                  name="departmentId"
                  class="form-select"
                  [ngModel]="request().departmentId"
                  (ngModelChange)="request.set({ ...request(), departmentId: +$event })"
                >
                  <option [ngValue]="0">Select Department</option>
                  @for (department of departments(); track department.id) {
                    <option [ngValue]="department.id">{{ department.name }}</option>
                  }
                </select>
              </div>
            </div>

            @if (errorMessage()) {
              <div class="alert alert-danger py-2 mb-0">{{ errorMessage() }}</div>
            }

            <button type="submit" class="btn btn-primary">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
