<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Delete Student</h2>
            <a routerLink="/student" class="btn btn-outline-secondary">Back</a>
          </div>

          @if (errorMessage()) {
            <div class="alert alert-danger py-2 mb-3">{{ errorMessage() }}</div>
          }

          @if (student()) {
            <p class="mb-3">Are you sure you want to delete <strong>{{ student()!.name }}</strong>?</p>
            <button type="button" class="btn btn-danger" (click)="confirmDelete()">Confirm Delete</button>
          }
        </div>
      </div>
    </div>
  </div>
</section>
