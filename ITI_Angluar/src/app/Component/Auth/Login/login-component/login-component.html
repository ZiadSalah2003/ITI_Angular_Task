<section class="container py-4">
	<div class="row justify-content-center">
		<div class="col-12 col-md-8 col-lg-5">
			<div class="card shadow-sm border-0">
				<div class="card-body p-4">
					<h2 class="h4 mb-3">Login</h2>

					<form (ngSubmit)="submit()" class="d-grid gap-3">
						<div>
							<label for="email" class="form-label">Email</label>
							<input id="email" name="email" type="email" class="form-control" [(ngModel)]="loginPayload.email" />
						</div>

						<div>
							<label for="password" class="form-label">Password</label>
							<input id="password" name="password" type="password" class="form-control" [(ngModel)]="loginPayload.password" />
						</div>

						@if (errorMessage) {
							<div class="alert alert-danger py-2 mb-0">{{ errorMessage }}</div>
						}

						<button type="submit" class="btn btn-primary w-100">Login</button>
					</form>

					<p class="mb-0 mt-3 text-secondary">
						Do not have an account?
						<a routerLink="/register" class="text-decoration-none">Register</a>
					</p>
				</div>
			</div>
		</div>
	</div>
</section>
