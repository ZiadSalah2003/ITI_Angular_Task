<section class="container py-4">
	<div class="row justify-content-center">
		<div class="col-12 col-md-9 col-lg-6">
			<div class="card shadow-sm border-0">
				<div class="card-body p-4">
					<h2 class="h4 mb-3">Register</h2>

					<form (ngSubmit)="submit()" class="d-grid gap-3">
						<div>
							<label for="name" class="form-label">Name</label>
							<input id="name" name="name" type="text" class="form-control" [(ngModel)]="registerPayload.name" />
						</div>

						<div>
							<label for="email" class="form-label">Email</label>
							<input id="email" name="email" type="email" class="form-control" [(ngModel)]="registerPayload.email" />
						</div>

						<div>
							<label for="password" class="form-label">Password</label>
							<input id="password" name="password" type="password" class="form-control" [(ngModel)]="registerPayload.password" />
						</div>

						<div class="row g-3">
							<div class="col-6">
								<label for="age" class="form-label">Age</label>
								<input id="age" name="age" type="number" class="form-control" [(ngModel)]="registerPayload.age" />
							</div>
							<div class="col-6">
								<label for="departmentId" class="form-label">Department Id</label>
								<input id="departmentId" name="departmentId" type="number" class="form-control" [(ngModel)]="registerPayload.departmentId" />
							</div>
						</div>

						@if (successMessage) {
							<div class="alert alert-success py-2 mb-0">{{ successMessage }}</div>
						}

						@if (errorMessage) {
							<div class="alert alert-danger py-2 mb-0">{{ errorMessage }}</div>
						}

						<button type="submit" class="btn btn-success w-100">Register</button>
					</form>

					<p class="mb-0 mt-3 text-secondary">
						Already have an account?
						<a routerLink="/login" class="text-decoration-none">Login</a>
					</p>
				</div>
			</div>
		</div>
	</div>
</section>
