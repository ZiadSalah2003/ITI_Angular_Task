<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Edit Course</h2>
            <a routerLink="/course" class="btn btn-outline-secondary">Back</a>
          </div>

          <form (ngSubmit)="submit()" class="d-grid gap-3">
            <div class="row g-3">
              <div class="col-12 col-md-6">
                <label for="name" class="form-label">Name</label>
                <input id="name" name="name" class="form-control" type="text" [(ngModel)]="request.crs_Name" />
              </div>

              <div class="col-12 col-md-3">
                <label for="duration" class="form-label">Duration</label>
                <input id="duration" name="duration" class="form-control" type="number" min="1" [(ngModel)]="request.duration" />
              </div>

              <div class="col-12 col-md-3">
                <label for="departmentId" class="form-label">Department Id</label>
                <input
                  id="departmentId"
                  name="departmentId"
                  class="form-control"
                  type="number"
                  min="1"
                  [(ngModel)]="request.departmentId"
                />
              </div>

              <div class="col-12">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" name="description" class="form-control" rows="3" [(ngModel)]="request.crs_Description"></textarea>
              </div>
            </div>

            @if (errorMessage) {
              <div class="alert alert-danger py-2 mb-0">{{ errorMessage }}</div>
            }

            <button type="submit" class="btn btn-primary">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
