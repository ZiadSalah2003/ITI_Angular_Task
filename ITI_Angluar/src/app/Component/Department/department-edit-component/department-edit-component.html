<section class="container py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-lg-6">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h4 mb-0">Edit Department</h2>
            <a routerLink="/department" class="btn btn-outline-secondary">Back</a>
          </div>

          <form (ngSubmit)="submit()" class="d-grid gap-3">
            <div>
              <label for="name" class="form-label">Name</label>
              <input id="name" name="name" class="form-control" [(ngModel)]="request.name" type="text" />
            </div>

            @if (errorMessage) {
              <div class="alert alert-danger py-2 mb-0">{{ errorMessage }}</div>
            }

            <button type="submit" class="btn btn-primary">Save</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
